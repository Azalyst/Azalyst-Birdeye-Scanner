name: Azalyst Alpha Scanner — Whale Tracking

on:
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan type"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - find_pumps
          - solana_only
          - multi_chain
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: azalyst-signal-engine
  cancel-in-progress: false

jobs:
  whale-tracking:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/whale'))
    env:
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      NIM_API_KEY: ${{ secrets.NIM_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run whale scan
        run: |
          CHAINS="solana,base"
          LIMIT="20"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.scan_type }}" in
              solana_only) CHAINS="solana"; LIMIT="25" ;;
              multi_chain) CHAINS="solana,base,ethereum,arbitrum,bnb"; LIMIT="12" ;;
              find_pumps) CHAINS="solana"; LIMIT="25" ;;
              *) CHAINS="solana,base"; LIMIT="20" ;;
            esac
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT="${{ github.event.comment.body }}"
            if echo "$COMMENT" | grep -qi "multi"; then CHAINS="solana,base,ethereum,arbitrum,bnb"; LIMIT="12"; fi
            if echo "$COMMENT" | grep -qi "solana"; then CHAINS="solana"; LIMIT="25"; fi
          fi

          python quant_signal_engine.py scan \
            --chains "$CHAINS" \
            --limit "$LIMIT" \
            --trade-limit 50 \
            --top-trader-limit 3 \
            --evaluate \
            --outcome-horizon-min 60 \
            --outcome-target-pct 10 \
            --qwen-brief \
            --show 25

      - name: Commit scan results
        run: |
          git config user.name "Azalyst Whale Bot"
          git config user.email "actions@github.com"

          git add -f data/birdeye_quant.db || true
          git add -f reports/latest_quant_signals.json reports/latest_quant_signals.csv || true
          git add -f reports/latest_quant_outcomes.json reports/latest_quant_outcomes.csv || true
          git add -f reports/latest_quant_brief.md || true
          git add -f reports/quant_signals_*.json reports/quant_signals_*.csv || true
          git add -f reports/quant_outcomes_*.json reports/quant_outcomes_*.csv || true
          git add -f reports/quant_brief_*.md || true

          git diff --staged --quiet && exit 0
          git commit -m "Update Azalyst whale scan"
          git pull --rebase -X theirs origin main || git rebase --abort
          git push origin HEAD:main

      - name: Comment on issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'No quant report was generated.';
            try {
              const data = JSON.parse(fs.readFileSync('reports/latest_quant_signals.json', 'utf8'));
              const rows = (data.signals || []).slice(0, 8).map(s =>
                `- ${s.chain}/${s.symbol}: ${s.label} pump=${s.pump_score} dump=${s.dump_score} risk=${s.risk_score}`
              );
              body = `## Azalyst Whale Scan\n\n${rows.join('\n')}`;
            } catch (e) {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
