name: Azalyst Alpha Scanner — Quant Signal Engine

on:
  workflow_dispatch:
    inputs:
      chains:
        description: "Comma-separated chains"
        required: true
        default: "all"
      scan_strategy:
        description: "When chains=all, scan all chains or rotate 3-chain batches"
        required: true
        default: "rotating"
        type: choice
        options:
          - rotating
          - full
      limit:
        description: "Token universe size per chain"
        required: true
        default: "10"
      trade_limit:
        description: "Recent token trades to aggregate per token"
        required: true
        default: "35"
      top_trader_limit:
        description: "Top traders to ingest per token"
        required: true
        default: "5"
      horizon_min:
        description: "Outcome check horizon in minutes"
        required: true
        default: "60"
      target_pct:
        description: "Return needed to mark signal true"
        required: true
        default: "10"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: azalyst-signal-engine
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      CHAINS: ${{ github.event.inputs.chains || 'all' }}
      SCAN_STRATEGY: ${{ github.event.inputs.scan_strategy || 'rotating' }}
      LIMIT: ${{ github.event.inputs.limit || '10' }}
      TRADE_LIMIT: ${{ github.event.inputs.trade_limit || '35' }}
      TOP_TRADER_LIMIT: ${{ github.event.inputs.top_trader_limit || '5' }}
      HORIZON_MIN: ${{ github.event.inputs.horizon_min || '60' }}
      TARGET_PCT: ${{ github.event.inputs.target_pct || '10' }}
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      NIM_API_KEY: ${{ secrets.NIM_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quant scan and evaluate old calls
        run: |
          ALL_CHAINS="solana,ethereum,base,arbitrum,bnb,avalanche,polygon,optimism,zksync"
          RESOLVED_CHAINS="$CHAINS"
          if [ "$CHAINS" = "all" ]; then
            if [ "$SCAN_STRATEGY" = "full" ]; then
              RESOLVED_CHAINS="$ALL_CHAINS"
            else
              SLOT=$(( (10#$(date -u +%M) / 15) % 3 ))
              case "$SLOT" in
                0) RESOLVED_CHAINS="solana,ethereum,base" ;;
                1) RESOLVED_CHAINS="arbitrum,bnb,avalanche" ;;
                2) RESOLVED_CHAINS="polygon,optimism,zksync" ;;
              esac
            fi
          fi

          echo "Scanning chains: $RESOLVED_CHAINS"
          echo "Trade limit: $TRADE_LIMIT"
          echo "Top trader limit: $TOP_TRADER_LIMIT"

          python quant_signal_engine.py scan \
            --chains "$RESOLVED_CHAINS" \
            --limit "$LIMIT" \
            --trade-limit "$TRADE_LIMIT" \
            --top-trader-limit "$TOP_TRADER_LIMIT" \
            --min-delay 0.12 \
            --evaluate \
            --outcome-horizon-min "$HORIZON_MIN" \
            --outcome-target-pct "$TARGET_PCT" \
            --qwen-brief \
            --show 25

          if [ -f data/birdeye_quant.db ]; then
            python -m ml schema
            python -m ml cluster
            python -m ml events
            python -m ml score mode=recent
            python -m ml export
          fi

      - name: Commit dashboard data
        run: |
          git config user.name "Azalyst Signal Bot"
          git config user.email "actions@github.com"

          git add -f data/birdeye_quant.db || true
          git add -f reports/latest_ml_scores.json || true
          git add -f reports/latest_quant_signals.json reports/latest_quant_signals.csv || true
          git add -f reports/latest_quant_outcomes.json reports/latest_quant_outcomes.csv || true
          git add -f reports/latest_quant_brief.md || true
          git add -f reports/quant_signals_*.json reports/quant_signals_*.csv || true
          git add -f reports/quant_outcomes_*.json reports/quant_outcomes_*.csv || true
          git add -f reports/quant_brief_*.md || true

          git diff --staged --quiet && exit 0
          SNAP=$(python -c "import json; d=json.load(open('reports/latest_quant_signals.json')); print(d.get('snapshot_count',0))" 2>/dev/null || echo 0)
          git commit -m "Azalyst scan: ${SNAP} snapshots — $(date -u +%H:%M UTC)"
          git pull --rebase -X theirs origin main || git rebase --abort
          git push origin HEAD:main
