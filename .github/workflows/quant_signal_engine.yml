name: Birdeye Quant Signal Engine

on:
  workflow_dispatch:
    inputs:
      chains:
        description: "Comma-separated chains"
        required: true
        default: "solana,base"
      limit:
        description: "Token universe size per chain"
        required: true
        default: "15"
      horizon_min:
        description: "Outcome check horizon in minutes"
        required: true
        default: "60"
      target_pct:
        description: "Return needed to mark signal true"
        required: true
        default: "10"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: birdeye-quant-signal-engine
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      CHAINS: ${{ github.event.inputs.chains || 'solana,base' }}
      LIMIT: ${{ github.event.inputs.limit || '15' }}
      HORIZON_MIN: ${{ github.event.inputs.horizon_min || '60' }}
      TARGET_PCT: ${{ github.event.inputs.target_pct || '10' }}
      BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
      NIM_API_KEY: ${{ secrets.NIM_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quant scan and evaluate old calls
        run: |
          if [ -z "$BIRDEYE_API_KEY" ]; then
            echo "BIRDEYE_API_KEY secret is required"
            exit 1
          fi

          python quant_signal_engine.py scan \
            --chains "$CHAINS" \
            --limit "$LIMIT" \
            --trade-limit 50 \
            --top-trader-limit 3 \
            --evaluate \
            --outcome-horizon-min "$HORIZON_MIN" \
            --outcome-target-pct "$TARGET_PCT" \
            --qwen-brief \
            --show 25

      - name: Commit dashboard data
        run: |
          git config user.name "Quant Signal Bot"
          git config user.email "actions@github.com"

          git add -f data/birdeye_quant.db || true
          git add -f reports/latest_quant_signals.json reports/latest_quant_signals.csv || true
          git add -f reports/latest_quant_outcomes.json reports/latest_quant_outcomes.csv || true
          git add -f reports/latest_quant_brief.md || true
          git add -f reports/quant_signals_*.json reports/quant_signals_*.csv || true
          git add -f reports/quant_outcomes_*.json reports/quant_outcomes_*.csv || true
          git add -f reports/quant_brief_*.md || true

          git diff --staged --quiet && exit 0
          git commit -m "Update Birdeye quant signals"
          git pull --rebase origin main || true
          git push
